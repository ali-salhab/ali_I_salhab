services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5000
      FRONTEND_URL: https://alisalhab.com
    volumes:
      - ./backend/data:/app/backend/data
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped
