services:
  - type: web
    name: portfolio-ali-salhab
    env: node
    plan: free
    buildCommand: npm install && npm install --prefix frontend && npm install --prefix backend && npm run build --prefix frontend && npm run build --prefix backend
    startCommand: npm start --prefix backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://ali-salhab.onrender.com
